// ======= NETWORK GRAPH COMPONENT =======
function NetworkGraph({ actors, setView }) {
  const svgRef = useRef(null);
  const tooltipRef = useRef(null);

  useEffect(() => {
    if (!actors || actors.length === 0 || !svgRef.current) return;

    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();

    const width = svgRef.current.clientWidth || 800;
    const height = 500;

    // Build nodes and links
    const nodeColors = {
      politician: { pro: '#ef4444', opp: '#34d399' },
      corporation: { pro: '#f97316', opp: '#22d3ee' },
      organization: { pro: '#f59e0b', opp: '#60a5fa' },
      government_agency: { pro: '#dc2626', opp: '#10b981' },
      state_government: { pro: '#fb923c', opp: '#6ee7b7' },
      international_body: { pro: '#e11d48', opp: '#2dd4bf' },
      think_tank: { pro: '#d97706', opp: '#818cf8' },
      individual: { pro: '#fbbf24', opp: '#a78bfa' },
    };

    const nodeSize = (influence) => Math.max(6, Math.min(20, influence * 2));

    // Create category hub nodes (invisible centers for clustering)
    const categoryHubs = ['surveillance', 'biometrics', 'digital_id', 'cbdc', 'censorship', 'ai_control', 'data_collection', 'financial_control'].map((cat, i) => ({
      id: 'hub-' + cat,
      type: 'hub',
      category: cat,
      label: cat.replace(/_/g, ' '),
      x: width/2 + Math.cos(i * Math.PI * 2 / 8) * 150,
      y: height/2 + Math.sin(i * Math.PI * 2 / 8) * 150,
    }));

    // Create actor nodes
    const actorNodes = actors.slice(0, 60).map((a, i) => ({
      id: 'actor-' + i,
      label: a.name,
      type: a.actor_type,
      role: a.role,
      category: a.category,
      influence: a.influence_score || 5,
      party: a.party,
      state: a.state_code,
      summary: a.action_summary,
      legislator_id: a.legislator_id,
      color: (nodeColors[a.actor_type] || nodeColors.individual)[a.role === 'opponent' ? 'opp' : 'pro'],
      radius: nodeSize(a.influence_score || 5),
    }));

    const nodes = [...categoryHubs, ...actorNodes];

    // Links: actors connect to their category hub
    const links = actorNodes.map(a => ({
      source: a.id,
      target: 'hub-' + a.category,
      strength: 0.3,
    })).filter(l => nodes.find(n => n.id === l.target));

    // Also connect actors in same category with same role (lighter links)
    for (let i = 0; i < actorNodes.length; i++) {
      for (let j = i + 1; j < actorNodes.length; j++) {
        if (actorNodes[i].category === actorNodes[j].category && actorNodes[i].role === actorNodes[j].role && Math.random() < 0.3) {
          links.push({ source: actorNodes[i].id, target: actorNodes[j].id, strength: 0.1 });
        }
      }
    }

    // Simulation
    const simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.strength > 0.2 ? 80 : 50).strength(d => d.strength))
      .force('charge', d3.forceManyBody().strength(d => d.type === 'hub' ? -200 : -30))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(d => (d.radius || 10) + 3))
      .force('x', d3.forceX(width / 2).strength(0.03))
      .force('y', d3.forceY(height / 2).strength(0.03));

    // Draw
    const g = svg.append('g');

    // Zoom
    svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', (event) => {
      g.attr('transform', event.transform);
    }));

    // Links
    const link = g.append('g').selectAll('line')
      .data(links).enter().append('line')
      .attr('stroke', d => d.strength > 0.2 ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.03)')
      .attr('stroke-width', d => d.strength > 0.2 ? 1 : 0.5);

    // Hub labels
    const hubLabel = g.append('g').selectAll('text')
      .data(categoryHubs).enter().append('text')
      .attr('text-anchor', 'middle')
      .attr('fill', 'rgba(255,255,255,0.25)')
      .attr('font-size', '10px')
      .attr('font-weight', '700')
      .text(d => d.label.toUpperCase());

    // Actor nodes
    const node = g.append('g').selectAll('circle')
      .data(actorNodes).enter().append('circle')
      .attr('r', d => d.radius)
      .attr('fill', d => d.color)
      .attr('stroke', '#fff')
      .attr('stroke-width', d => d.influence >= 8 ? 2 : 0.5)
      .attr('stroke-opacity', d => d.influence >= 8 ? 0.8 : 0.3)
      .attr('cursor', 'pointer')
      .call(d3.drag()
        .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
        .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
      );

    // Node labels (only for high influence)
    const nodeLabel = g.append('g').selectAll('text')
      .data(actorNodes.filter(a => a.influence >= 7)).enter().append('text')
      .attr('text-anchor', 'middle')
      .attr('dy', d => d.radius + 12)
      .attr('fill', '#fff')
      .attr('font-size', '9px')
      .attr('font-weight', '600')
      .attr('pointer-events', 'none')
      .text(d => d.label.length > 20 ? d.label.slice(0, 18) + '...' : d.label);

    // Tooltip
    const tooltip = d3.select(tooltipRef.current);
    node.on('mouseover', (event, d) => {
      tooltip.classed('visible', true)
        .style('left', (event.offsetX + 15) + 'px')
        .style('top', (event.offsetY - 10) + 'px')
        .html(`<strong style="color:${d.color}">${d.label}</strong><br/>
          <span style="opacity:0.7">${d.type.replace(/_/g, ' ')} • ${d.role === 'opponent' ? 'Fighting Grid' : 'Pushing Grid'}</span><br/>
          ${d.party ? '<span>Party: ' + d.party + '</span> ' : ''}${d.state ? '<span>State: ' + d.state + '</span>' : ''}<br/>
          <span style="opacity:0.7">Influence: ${d.influence}/10</span><br/>
          ${d.summary ? '<span style="font-size:0.72rem;opacity:0.8">' + d.summary.slice(0, 150) + '</span>' : ''}`);
    }).on('mouseout', () => {
      tooltip.classed('visible', false);
    }).on('click', (event, d) => {
      if (d.legislator_id) setView({ page: 'legislator', id: d.legislator_id });
    });

    // Tick
    simulation.on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('cx', d => d.x).attr('cy', d => d.y);
      hubLabel.attr('x', d => d.x).attr('y', d => d.y);
      nodeLabel.attr('x', d => d.x).attr('y', d => d.y);
    });

    return () => simulation.stop();
  }, [actors]);

  return (
    <div>
      <div className="cg-network-legend">
        <div className="cg-network-legend-item"><div className="cg-network-legend-dot" style={{background:'#ef4444'}}></div> Politicians (pro)</div>
        <div className="cg-network-legend-item"><div className="cg-network-legend-dot" style={{background:'#34d399'}}></div> Politicians (opp)</div>
        <div className="cg-network-legend-item"><div className="cg-network-legend-dot" style={{background:'#f97316'}}></div> Corporations (pro)</div>
        <div className="cg-network-legend-item"><div className="cg-network-legend-dot" style={{background:'#22d3ee'}}></div> Corporations (opp)</div>
        <div className="cg-network-legend-item"><div className="cg-network-legend-dot" style={{background:'#f59e0b'}}></div> Organizations (pro)</div>
        <div className="cg-network-legend-item"><div className="cg-network-legend-dot" style={{background:'#60a5fa'}}></div> Organizations (opp)</div>
        <div className="cg-network-legend-item"><div className="cg-network-legend-dot" style={{background:'#dc2626'}}></div> Gov Agencies</div>
        <div className="cg-network-legend-item"><div className="cg-network-legend-dot" style={{background:'#e11d48'}}></div> International</div>
        <span style={{marginLeft:'auto',fontSize:'0.7rem',color:'var(--text-dim)'}}>Drag nodes • Scroll to zoom • Click politicians for profile</span>
      </div>
      <div className="cg-network-container">
        <svg ref={svgRef}></svg>
        <div className="cg-network-tooltip" ref={tooltipRef}></div>
      </div>
    </div>
  );
}

// ======= SUBMIT EVIDENCE COMPONENT =======
function SubmitEvidence() {
  const [content, setContent] = useState('');
  const [url, setUrl] = useState('');
  const [status, setStatus] = useState(null); // null, 'submitting', 'success', 'error', 'rejected'
  const [result, setResult] = useState(null);

  const handleSubmit = async () => {
    if (!content.trim() && !url.trim()) return;
    setStatus('submitting');
    setResult(null);

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/ingest-evidence`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content: content.trim(),
          source_url: url.trim(),
          source_name: 'App submission',
          submitted_by: 'user',
        }),
      });
      const data = await res.json();
      if (data.status === 'ingested') {
        setStatus('success');
        setResult(data);
        setContent('');
        setUrl('');
      } else if (data.status === 'rejected') {
        setStatus('rejected');
        setResult(data);
      } else if (data.error) {
        setStatus('error');
        setResult(data);
      } else {
        setStatus('success');
        setResult(data);
      }
    } catch (e) {
      setStatus('error');
      setResult({ error: e.message });
    }
  };

  return (
    <div className="cg-submit-panel">
      <h4>&#128233; Submit Evidence</h4>
      <p style={{color:'var(--text-dim)',fontSize:'0.82rem',marginBottom:'0.75rem'}}>
        Paste an article, news story, bill text, or any evidence of digital control grid activity. AI will analyze, score, and add it to the scorecard.
      </p>
      <textarea
        className="cg-submit-input"
        placeholder="Paste article text, news content, or describe the evidence..."
        value={content}
        onChange={(e) => setContent(e.target.value)}
        rows={4}
      />
      <div className="cg-submit-row">
        <input
          className="cg-submit-url"
          placeholder="Source URL (optional)"
          value={url}
          onChange={(e) => setUrl(e.target.value)}
        />
        <button
          className="cg-submit-btn"
          onClick={handleSubmit}
          disabled={status === 'submitting' || (!content.trim() && !url.trim())}
        >
          {status === 'submitting' ? 'Analyzing...' : 'Submit Evidence'}
        </button>
      </div>
      {status === 'success' && result && (
        <div className="cg-submit-status" style={{color:'#34d399'}}>
          &#10003; {result.items_created} evidence item{result.items_created !== 1 ? 's' : ''} ingested. {result.submission_summary}
        </div>
      )}
      {status === 'rejected' && result && (
        <div className="cg-submit-status" style={{color:'#fbbf24'}}>
          &#9888; {result.reason || 'Not relevant to control grid tracking.'}
        </div>
      )}
      {status === 'error' && result && (
        <div className="cg-submit-status" style={{color:'#f87171'}}>
          &#10007; Error: {result.error || 'Submission failed'}
        </div>
      )}
      <p style={{color:'var(--text-dim)',fontSize:'0.7rem',marginTop:'0.5rem'}}>
        You can also email evidence to your ingest endpoint. Items expire after 14 days.
      </p>
    </div>
  );
}

                  <div style={{fontSize:'1.1rem',fontWeight:800,color:'#fff',marginBottom:'0.3rem'}}>Final Risk Score</div>
                  <div className="cg-risk-formula">
                    Raw Score: {compositeScore.raw_score > 0 ? '+' : ''}{compositeScore.raw_score}/20 &rarr; Base: {Math.round(compositeScore.base_risk_pct)}% &times; {compositeScore.acceleration_multiplier}x = <strong style={{color: bandColor(compositeScore.interpretation_band)}}>{Math.round(compositeScore.final_risk_pct)}%</strong>
                  </div>
                </div>
              </div>

              {/* 5 Variable Breakdown */}
              <div className="cg-variables">
                {[
                  { key: 'surveillance', label: 'Surveillance, Identity & Data', score: compositeScore.surveillance_score, rationale: compositeScore.surveillance_rationale },
                  { key: 'behavioral', label: 'Behavioral Enforcement & Access', score: compositeScore.behavioral_score, rationale: compositeScore.behavioral_rationale },
                  { key: 'speech', label: 'Speech & Narrative Control', score: compositeScore.speech_score, rationale: compositeScore.speech_rationale },
                  { key: 'guardrails', label: 'Institutional Guardrails', score: compositeScore.guardrails_score, rationale: compositeScore.guardrails_rationale },
                ].map(v => (
                  <div className="cg-var-card" key={v.key}>
                    <div className="cg-var-label">{v.label}</div>
                    <div className="cg-var-score-row">
                      <div className="cg-var-score" style={{color: varColor(v.score)}}>{v.score > 0 ? '+' : ''}{v.score}</div>
                      <div className="cg-var-bar">
                        <div className="cg-var-bar-fill" style={{
                          width: `${varBarWidth(v.score)}%`,
                          left: 0,
                          background: `linear-gradient(90deg, #34d399 0%, #6b7280 50%, #ef4444 100%)`,
                          opacity: 0.3
                        }}></div>
                        <div style={{
                          position:'absolute', top:0, height:'100%', width:'4px', borderRadius:'2px',
                          background: varColor(v.score), left: `calc(${varBarWidth(v.score)}% - 2px)`
                        }}></div>
                      </div>
                    </div>
                    {v.rationale && <div className="cg-var-rationale">{v.rationale}</div>}
                  </div>
                ))}

                {/* Multiplier card spans full width */}
                <div className="cg-multiplier-card">
                  <div className="cg-var-label" style={{color:'#fbbf24'}}>&#9889; Implementation Acceleration Multiplier</div>
                  <div className="cg-var-score-row">
                    <div className="cg-var-score" style={{color:'#fbbf24'}}>{compositeScore.acceleration_multiplier}x</div>
                    <div style={{fontSize:'0.82rem',color:'var(--text-dim)'}}>
                      (Score: {compositeScore.acceleration_score > 0 ? '+' : ''}{compositeScore.acceleration_score})
                      {compositeScore.acceleration_score > 2 ? ' — Rapid implementation momentum' :
                       compositeScore.acceleration_score > 0 ? ' — Building momentum' :
                       compositeScore.acceleration_score === 0 ? ' — Normal pace' :
                       compositeScore.acceleration_score >= -2 ? ' — Facing resistance' :
                       ' — Strong reversal underway'}
                    </div>
                  </div>
                  {compositeScore.acceleration_rationale && <div className="cg-var-rationale">{compositeScore.acceleration_rationale}</div>}
                </div>
              </div>

              {/* Overall Analysis */}
              {compositeScore.overall_analysis && (
                <div className="cg-overall-analysis">
                  <strong style={{color:'#fff'}}>Overall Assessment:</strong> {compositeScore.overall_analysis}
                </div>
              )}
            </div>
          )}

          {/* Summary stats */}
          {summary && (
            <div className="feed-stats" style={{marginBottom:'1.5rem'}}>
              <div className="feed-stat"><span className="feed-stat-value">{summary.total}</span> Evidence Items</div>
              <div className="feed-stat" style={{color:'#f87171'}}>
                <span className="feed-stat-value" style={{color:'#f87171'}}>{summary.for_count}</span> For Grid ({'+' + summary.for_score})
              </div>
              <div className="feed-stat" style={{color:'#34d399'}}>
                <span className="feed-stat-value" style={{color:'#34d399'}}>{summary.against_count}</span> Against ({summary.against_score})
              </div>
            </div>
          )}

          {/* Two-column scorecard */}
          <div className="cg-columns">
            {/* FOR column */}
            <div className="cg-column">
              <div className="cg-column-title for-col">
                <span style={{fontSize:'1.1rem'}}>&#9650;</span>
                Evidence FOR the Control Grid
              </div>
              {forItems.map((item, i) => (
                <React.Fragment key={item.id || 'f'+i}>
                  <div className="cg-item" onClick={() => setExpandedItem(expandedItem === 'f'+i ? null : 'f'+i)}>
                    <div style={{display:'flex',alignItems:'center',gap:'0.5rem',flex:1,minWidth:0}}>
                      <span className={`cg-item-tag ${item.source_type}`}>{item.source_type === 'executive_order' ? 'EO' : item.source_type}</span>
                      <span className="cg-item-title">{item.title}</span>
                    </div>
                    <span className="cg-item-score for-score">+{item.score}</span>
                  </div>
                  {expandedItem === 'f'+i && (
                    <div className="cg-item-detail">
                      <div>{item.summary}</div>
                      <div className="cg-item-meta">
                        {item.source_name && <span>Source: {item.source_name}</span>}
                        {item.country && item.country !== 'US' && <span>Country: {item.country}</span>}
                        <span>Category: {categoryLabel(item.category)}</span>
                        {item.confidence && <span>Confidence: {Math.round(item.confidence * 100)}%</span>}
                      </div>
                      {item.ai_analysis && (
                        <div style={{marginTop:'0.5rem',fontStyle:'italic',color:'var(--text-dim)'}}>{item.ai_analysis}</div>
                      )}
                    </div>
                  )}
                </React.Fragment>
              ))}
              {forItems.length === 0 && (
                <div className="cg-item"><span className="cg-item-title" style={{color:'var(--text-dim)'}}>No evidence items</span></div>
              )}
            </div>

            {/* AGAINST column */}
            <div className="cg-column">
              <div className="cg-column-title against-col">
                <span style={{fontSize:'1.1rem'}}>&#9660;</span>
                Evidence AGAINST the Control Grid (Policy Reversals)
              </div>
              {againstItems.map((item, i) => (
                <React.Fragment key={item.id || 'a'+i}>
                  <div className="cg-item" onClick={() => setExpandedItem(expandedItem === 'a'+i ? null : 'a'+i)}>
                    <div style={{display:'flex',alignItems:'center',gap:'0.5rem',flex:1,minWidth:0}}>
                      <span className={`cg-item-tag ${item.source_type}`}>{item.source_type === 'executive_order' ? 'EO' : item.source_type}</span>
                      <span className="cg-item-title">{item.title}</span>
                    </div>
                    <span className="cg-item-score against-score">{item.score}</span>
                  </div>
                  {expandedItem === 'a'+i && (
                    <div className="cg-item-detail">
                      <div>{item.summary}</div>
                      <div className="cg-item-meta">
                        {item.source_name && <span>Source: {item.source_name}</span>}
                        {item.country && item.country !== 'US' && <span>Country: {item.country}</span>}
                        <span>Category: {categoryLabel(item.category)}</span>
                        {item.confidence && <span>Confidence: {Math.round(item.confidence * 100)}%</span>}
                      </div>
                      {item.ai_analysis && (
                        <div style={{marginTop:'0.5rem',fontStyle:'italic',color:'var(--text-dim)'}}>{item.ai_analysis}</div>
                      )}
                    </div>
                  )}
                </React.Fragment>
              ))}
              {againstItems.length === 0 && (
                <div className="cg-item"><span className="cg-item-title" style={{color:'var(--text-dim)'}}>No evidence items</span></div>
              )}
            </div>
          </div>

          {/* Category Breakdown */}
          {Object.keys(categories).length > 0 && (
            <div>
              <h3 style={{color:'#fff',fontSize:'1rem',fontWeight:700,marginTop:'2rem',marginBottom:'0.75rem'}}>Category Breakdown</h3>
              <div className="cg-category-breakdown">
                {Object.entries(categories).map(([cat, data]) => {
                  const catNet = data.for_score + data.against_score;
                  return (
                    <div className="cg-cat-card" key={cat}>
                      <div className="cg-cat-name">{categoryLabel(cat)}</div>
                      <div className={`cg-cat-score ${catNet > 0 ? '' : ''}`} style={{color: catNet > 0 ? '#f87171' : catNet < 0 ? '#34d399' : 'var(--text-dim)'}}>
                        {catNet > 0 ? '+' : ''}{catNet}
                      </div>
                      <div style={{fontSize:'0.65rem',color:'var(--text-dim)',marginTop:'0.2rem'}}>
                        {data.for_count} for / {data.against_count} against
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Scale Legend */}
          <div className="cg-scale-legend">
            <span style={{color:'#34d399',fontWeight:600}}>-5 = Liberty Preserving</span>
            <span style={{color:'var(--text-dim)'}}>0 = Neutral / Mixed</span>
            <span style={{color:'#f87171',fontWeight:600}}>+5 = Control Grid Expansion</span>
          </div>

          {/* Interpretation Bands */}
          {compositeScore && (
            <div style={{display:'flex',gap:'0.3rem',marginTop:'0.75rem',fontSize:'0.68rem',fontWeight:600}}>
              <div style={{flex:1,padding:'0.3rem',textAlign:'center',background:'rgba(52,211,153,0.1)',color:'#34d399',borderRadius:'4px'}}>0-20% Low</div>
              <div style={{flex:1,padding:'0.3rem',textAlign:'center',background:'rgba(96,165,250,0.1)',color:'#60a5fa',borderRadius:'4px'}}>21-40% Guarded</div>
              <div style={{flex:1,padding:'0.3rem',textAlign:'center',background:'rgba(251,191,36,0.1)',color:'#fbbf24',borderRadius:'4px'}}>41-60% Transitional</div>
              <div style={{flex:1,padding:'0.3rem',textAlign:'center',background:'rgba(249,115,22,0.1)',color:'#f97316',borderRadius:'4px'}}>61-80% High</div>
              <div style={{flex:1,padding:'0.3rem',textAlign:'center',background:'rgba(239,68,68,0.1)',color:'#ef4444',borderRadius:'4px'}}>81-100% Severe</div>
            </div>
          )}

          {/* ===== ACTORS SECTION ===== */}
          {actors.length > 0 && (() => {
            const proponents = actors.filter(a => a.role === 'proponent');
            const opponents = actors.filter(a => a.role === 'opponent');

            const actorTypeLabel = (t) => ({
              politician: 'Politicians & Legislators',
              corporation: 'Corporations & Tech Companies',
              organization: 'Organizations & Think Tanks',
              government_agency: 'Government Agencies',
              state_government: 'State Governments',
              international_body: 'International Bodies',
              think_tank: 'Think Tanks & Advocacy',
            })[t] || t;

            const actorTypeOrder = ['politician','corporation','organization','government_agency','state_government','international_body','think_tank'];

            const groupByType = (list) => {
              const groups = {};
              list.forEach(a => {
                const t = a.actor_type || 'other';
                if (!groups[t]) groups[t] = [];
                groups[t].push(a);
              });
              return actorTypeOrder.filter(t => groups[t]).map(t => [t, groups[t].sort((a,b) => (b.influence_score||0) - (a.influence_score||0))]);
            };

            const influenceTag = (score) => {
              if (score >= 8) return { label: 'High Influence', cls: 'high' };
              if (score >= 5) return { label: 'Med Influence', cls: 'med' };
              return { label: 'Low Influence', cls: 'low' };
            };

            const renderActorCard = (actor, idx, prefix) => {
              const inf = influenceTag(actor.influence_score || 0);
              const key = prefix + idx;
              const isExpanded = expandedActor === key;
              return (
                <div className="cg-actor-card" key={key} onClick={() => setExpandedActor(isExpanded ? null : key)}>
                  <div className="cg-actor-card-top">
                    <div className="cg-actor-name">
                      {actor.legislator_id ? (
                        <a href="#" onClick={(e) => { e.stopPropagation(); setView({ page: 'legislator', id: actor.legislator_id }); }}>{actor.name}</a>
                      ) : actor.name}
                    </div>
                    <span className={`cg-actor-influence ${inf.cls}`}>{inf.label}</span>
                  </div>
                  <div className="cg-actor-meta">
                    {actor.party && <span>{actor.party}</span>}
                    {actor.state_code && <span>{actor.state_code}</span>}
                    {actor.category && <span>{categoryLabel(actor.category)}</span>}
                    {actor.involvement_type && <span>{actor.involvement_type}</span>}
                  </div>
                  {actor.action_summary && <div className="cg-actor-summary">{actor.action_summary}</div>}
                  {isExpanded && actor.ai_analysis && (
                    <div className="cg-actor-analysis">{actor.ai_analysis}</div>
                  )}
                </div>
              );
            };

            const renderGroup = (list, prefix) => {
              const grouped = groupByType(list);
              if (grouped.length === 0) return <div style={{color:'var(--text-dim)',padding:'1rem',fontSize:'0.9rem'}}>No actors identified yet</div>;
              return grouped.map(([type, items]) => (
                <div className="cg-actor-type-group" key={type}>
                  <div className="cg-actor-type-label">{actorTypeLabel(type)} ({items.length})</div>
                  <div className="cg-actor-cards">
                    {items.map((a, i) => renderActorCard(a, i, prefix + type))}
                  </div>
                </div>
              ));
            };

            return (
              <div className="cg-actors-section">
                <h3 style={{color:'#fbbf24',fontSize:'1.3rem',fontWeight:800,marginBottom:'0.25rem',display:'flex',alignItems:'center',gap:'0.5rem'}}>
                  &#128373; Who's Behind It &amp; Who's Fighting It
                </h3>
                <p style={{color:'var(--text-dim)',fontSize:'0.82rem',marginBottom:'1.25rem'}}>
                  AI analysis of bill sponsors, public statements, technology developers, and policy advocates — identifying who is pushing the digital control grid and who is actively resisting it.
                </p>

                {summary && summary.actor_count > 0 && (
                  <div className="feed-stats" style={{marginBottom:'1.25rem'}}>
                    <div className="feed-stat"><span className="feed-stat-value">{summary.actor_count}</span> Actors Identified</div>
                    <div className="feed-stat" style={{color:'#f87171'}}>
                      <span className="feed-stat-value" style={{color:'#f87171'}}>{summary.proponent_count || proponents.length}</span> Proponents
                    </div>
                    <div className="feed-stat" style={{color:'#34d399'}}>
                      <span className="feed-stat-value" style={{color:'#34d399'}}>{summary.opponent_count || opponents.length}</span> Opponents
                    </div>
                  </div>
                )}

                {/* Toggle tabs */}
                <div style={{display:'flex',gap:'0.5rem',marginBottom:'1.25rem'}}>
                  <button
                    onClick={() => setActorsView('proponents')}
                    style={{
                      padding:'0.5rem 1.25rem', borderRadius:'var(--radius)', border:'1px solid',
                      cursor:'pointer', fontWeight:700, fontSize:'0.88rem', transition:'all 0.2s',
                      background: actorsView==='proponents' ? 'rgba(239,68,68,0.15)' : 'var(--navy-mid)',
                      color: actorsView==='proponents' ? '#f87171' : 'var(--text-dim)',
                      borderColor: actorsView==='proponents' ? 'rgba(239,68,68,0.3)' : 'var(--border)',
                    }}
                  >&#9650; Pushing the Grid ({proponents.length})</button>
                  <button
                    onClick={() => setActorsView('opponents')}
                    style={{
                      padding:'0.5rem 1.25rem', borderRadius:'var(--radius)', border:'1px solid',
                      cursor:'pointer', fontWeight:700, fontSize:'0.88rem', transition:'all 0.2s',
                      background: actorsView==='opponents' ? 'rgba(16,185,129,0.15)' : 'var(--navy-mid)',
                      color: actorsView==='opponents' ? '#34d399' : 'var(--text-dim)',
                      borderColor: actorsView==='opponents' ? 'rgba(16,185,129,0.3)' : 'var(--border)',
                    }}
                  >&#9660; Fighting the Grid ({opponents.length})</button>
                  <button
                    onClick={() => setActorsView('states')}
                    style={{
                      padding:'0.5rem 1.25rem', borderRadius:'var(--radius)', border:'1px solid',
                      cursor:'pointer', fontWeight:700, fontSize:'0.88rem', transition:'all 0.2s',
                      background: actorsView==='states' ? 'rgba(245,158,11,0.15)' : 'var(--navy-mid)',
                      color: actorsView==='states' ? '#fbbf24' : 'var(--text-dim)',
                      borderColor: actorsView==='states' ? 'rgba(245,158,11,0.3)' : 'var(--border)',
                    }}
                  >&#127463; State Breakdown</button>
                  <button
                    onClick={() => setActorsView('network')}
                    style={{
                      padding:'0.5rem 1.25rem', borderRadius:'var(--radius)', border:'1px solid',
                      cursor:'pointer', fontWeight:700, fontSize:'0.88rem', transition:'all 0.2s',
                      background: actorsView==='network' ? 'rgba(139,92,246,0.15)' : 'var(--navy-mid)',
                      color: actorsView==='network' ? '#a78bfa' : 'var(--text-dim)',
                      borderColor: actorsView==='network' ? 'rgba(139,92,246,0.3)' : 'var(--border)',
                    }}
                  >&#128752; Network Graph</button>
                </div>

                {actorsView === 'proponents' && (
                  <div>
                    <div className="cg-actors-header proponent">&#9650; Pushing the Digital Control Grid</div>
                    {renderGroup(proponents, 'pro-')}
                  </div>
                )}

                {actorsView === 'opponents' && (
                  <div>
                    <div className="cg-actors-header opponent">&#9660; Fighting the Digital Control Grid</div>
                    {renderGroup(opponents, 'opp-')}
                  </div>
                )}

                {actorsView === 'states' && (
                  <div className="cg-state-section">
                    <div className="cg-state-header">&#127463; State-Level Breakdown</div>
                    {Object.keys(stateBreakdown).length > 0 ? (
                      <div className="cg-state-grid">
                        {Object.entries(stateBreakdown)
                          .sort((a,b) => (b[1].proponent_count + b[1].opponent_count) - (a[1].proponent_count + a[1].opponent_count))
                          .map(([state, data]) => {
                            const cls = data.proponent_count > data.opponent_count ? 'pro-dominant'
                              : data.opponent_count > data.proponent_count ? 'opp-dominant' : 'mixed';
                            return (
                              <div className={`cg-state-card ${cls}`} key={state}>
                                <div className="cg-state-name">{state}</div>
                                <div className="cg-state-counts">
                                  <span className="cg-state-pro">&#9650; {data.proponent_count} pushing</span>
                                  <span className="cg-state-opp">&#9660; {data.opponent_count} fighting</span>
                                </div>
                              </div>
                            );
                          })}
                      </div>
                    ) : (
                      <div style={{color:'var(--text-dim)',padding:'1rem',fontSize:'0.9rem'}}>No state-level data available yet. Run the scanner to populate.</div>
                    )}
                  </div>
                )}

                {actorsView === 'network' && (
                  <NetworkGraph actors={[...proponents, ...opponents]} setView={setView} />
                )}
              </div>
            );
          })()}

          {/* Submit Evidence */}
          <SubmitEvidence />

          <div className="scanner-disclaimer" style={{marginTop:'1.5rem'}}>
            <strong>Disclaimer:</strong> The Digital Control Grid Evidence Scorecard uses AI to analyze legislation, news, and social media for indicators of
            digital surveillance and control infrastructure. Scores reflect AI assessment of implementation status, not editorial judgment.
            Evidence items are sourced from real data including bills in the GlassPalace database, RSS news feeds, and social media.
            This tool is for informational purposes — verify claims independently.
          </div>
        </div>
      )}
    </div>
  );
}

// ======= APP =======
function App() {
  const [view, setView] = useState({ page: 'dashboard' });
  const [user, setUser] = useState(null);
  const [showAuth, setShowAuth] = useState(false);
  const [showOnboarding, setShowOnboarding] = useState(false);

  const handleSearch = (query) => setView({ page: 'search', query });

  const handleAuth = (authUser) => {
    setUser(authUser);
    // Check if onboarding needed (new user with no profile)
    fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${authUser.id}&select=onboarding_complete`, {
      headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${getToken()}` }
    }).then(r => r.json()).then(data => {
      if (!data || data.length === 0 || !data[0].onboarding_complete) {
        setShowOnboarding(true);
      }
    }).catch(() => {});
  };

  const handleSignOut = () => {
    const token = getToken();
    if (token) authSignOut(token);
    setAuthState(null, null);
    setUser(null);
    setView({ page: 'dashboard' });
  };

  let content;
  switch (view.page) {
    case 'dashboard': content = <Dashboard setView={setView} />; break;
    case 'bills': content = <BillsList setView={setView} />; break;
    case 'bill': content = <BillDetail id={view.id} setView={setView} />; break;
    case 'legislators': content = <LegislatorsList setView={setView} />; break;
    case 'legislator': content = <LegislatorDetail id={view.id} setView={setView} />; break;
    case 'search': content = <SearchResults query={view.query} setView={setView} />; break;
    case 'watchlist': content = <WatchlistPage setView={setView} user={user} />; break;
    case 'spectrum': content = <SpectrumPage setView={setView} />; break;
    case 'notifications': content = <NotificationPrefsPage user={user} />; break;
    case 'scanner': content = <PsyOpScanner user={user} />; break;
    case 'control-grid': content = <ControlGridPage setView={setView} />; break;
    default: content = <Dashboard setView={setView} />;
  }

  return (
    <div className="app">
      <Header view={view} setView={setView} onSearch={handleSearch} user={user} onAuthClick={() => setShowAuth(true)} onSignOut={handleSignOut} />
      <main className="main">{content}</main>
      <footer className="footer">
        <p>\u00a9 2026 GlassPalace. Civic Intelligence Platform.</p>
        <p style={{marginTop:'0.25rem'}}>Defending the Constitution through transparency and accountability.</p>
      </footer>
      {showAuth && <AuthModal onClose={() => setShowAuth(false)} onAuth={handleAuth} />}
      {showOnboarding && user && <OnboardingModal user={user} onClose={() => setShowOnboarding(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
