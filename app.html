<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlassPalace — Civic Intelligence Platform</title>
<meta name="description" content="Track legislation, grade your representatives, and defend the Constitution with GlassPalace.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --navy: #0a0e27;
    --navy-light: #141832;
    --navy-mid: #1e2448;
    --blue: #3b82f6;
    --blue-dark: #2563eb;
    --blue-glow: rgba(59, 130, 246, 0.15);
    --green: #10b981;
    --red: #ef4444;
    --amber: #f59e0b;
    --gold: #fbbf24;
    --text: #e0e7ef;
    --text-dim: #8892a8;
    --border: #2a2f4e;
    --card: #141832;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--navy);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Layout */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .main { flex: 1; max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; width: 100%; }

  /* Header */
  .header {
    background: rgba(10, 14, 39, 0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    padding: 0 1.5rem;
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; }
  .logo-icon { font-size: 1.5rem; }
  .logo-text { font-weight: 800; font-size: 1.2rem; color: #fff; letter-spacing: -0.02em; }
  .logo-badge { font-size: 0.6rem; background: var(--blue); color: #fff; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .nav { display: flex; gap: 0.25rem; }
  .nav-btn {
    padding: 0.5rem 1rem; border: none; background: transparent;
    color: var(--text-dim); font-size: 0.9rem; font-weight: 500;
    cursor: pointer; border-radius: 8px; transition: all 0.2s;
    font-family: inherit;
  }
  .nav-btn:hover { color: var(--text); background: var(--navy-light); }
  .nav-btn.active { color: #fff; background: var(--navy-mid); }
  .search-bar {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--navy-light); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.4rem 0.8rem; width: 260px;
  }
  .search-bar input {
    background: transparent; border: none; color: var(--text);
    font-size: 0.85rem; width: 100%; outline: none; font-family: inherit;
  }
  .search-bar input::placeholder { color: var(--text-dim); }

  /* Cards */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #3a4068; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .card-title { font-size: 1.1rem; font-weight: 700; color: #fff; }

  /* Stats Grid */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { text-align: center; padding: 1.25rem; }
  .stat-value { font-size: 2rem; font-weight: 800; color: #fff; }
  .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Citizen Accessibility Score Badge */
  .cfs-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; border-radius: 50%;
    font-weight: 800; font-size: 0.95rem; color: #fff;
    flex-shrink: 0;
  }
  .cfs-badge.high { background: linear-gradient(135deg, #10b981, #059669); }
  .cfs-badge.mid { background: linear-gradient(135deg, #f59e0b, #d97706); }
  .cfs-badge.low { background: linear-gradient(135deg, #ef4444, #dc2626); }
  .cfs-badge.none { background: var(--navy-mid); color: var(--text-dim); font-size: 0.7rem; }
  .cfs-badge-sm { width: 36px; height: 36px; font-size: 0.8rem; }

  /* Trend indicators */
  .trend { font-size: 0.75rem; font-weight: 600; }
  .trend.rising { color: var(--green); }
  .trend.falling { color: var(--red); }
  .trend.stable { color: var(--text-dim); }
  .trend.new { color: var(--blue); }

  /* Party badges */
  .party-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%;
    font-size: 0.65rem; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .party-R { background: #ef4444; }
  .party-D { background: #3b82f6; }
  .party-I { background: #8b5cf6; }
  .party-L { background: #f59e0b; }

  /* Status badges */
  .status-badge {
    display: inline-block; padding: 0.15rem 0.6rem; border-radius: 20px;
    font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
  }
  .status-introduced { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .status-committee { background: rgba(139,92,246,0.15); color: #a78bfa; }
  .status-passed_house, .status-passed_senate { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .status-passed_both { background: rgba(16,185,129,0.15); color: #34d399; }
  .status-signed { background: rgba(16,185,129,0.2); color: #10b981; }
  .status-vetoed { background: rgba(239,68,68,0.15); color: #f87171; }
  .status-active, .status-enacted { background: rgba(16,185,129,0.15); color: #34d399; }

  /* Tables */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-weight: 600; }
  td { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(42,47,78,0.5); font-size: 0.9rem; }
  tr:hover td { background: rgba(59, 130, 246, 0.03); }
  .clickable { cursor: pointer; }

  /* Filters */
  .filters { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
  .filter-select {
    background: var(--navy-light); border: 1px solid var(--border);
    color: var(--text); padding: 0.5rem 0.75rem; border-radius: 8px;
    font-size: 0.85rem; font-family: inherit; cursor: pointer; outline: none;
  }
  .filter-select:focus { border-color: var(--blue); }

  /* Pagination */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
  .page-btn {
    padding: 0.4rem 0.8rem; border: 1px solid var(--border); background: var(--navy-light);
    color: var(--text); border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-family: inherit;
  }
  .page-btn:hover { border-color: var(--blue); }
  .page-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Detail page */
  .detail-header { display: flex; gap: 1.5rem; align-items: flex-start; margin-bottom: 2rem; }
  .detail-photo {
    width: 120px; height: 120px; border-radius: 16px; object-fit: cover;
    background: var(--navy-mid); border: 2px solid var(--border);
  }
  .detail-info h1 { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 0.25rem; }
  .detail-meta { display: flex; gap: 1rem; flex-wrap: wrap; color: var(--text-dim); font-size: 0.9rem; }
  .detail-meta span { display: flex; align-items: center; gap: 0.3rem; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .bill-title { font-weight: 600; color: #fff; }
  .bill-number { color: var(--blue); font-weight: 600; font-size: 0.85rem; }

  /* CAS Meter */
  .cfs-meter { margin: 1rem 0; }
  .cfs-bar-bg { height: 12px; background: var(--navy-mid); border-radius: 6px; overflow: hidden; }
  .cfs-bar-fill { height: 100%; border-radius: 6px; transition: width 0.8s ease; }
  .cfs-bar-fill.high { background: linear-gradient(90deg, #10b981, #34d399); }
  .cfs-bar-fill.mid { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .cfs-bar-fill.low { background: linear-gradient(90deg, #ef4444, #f87171); }
  .cfs-components { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-top: 1rem; }
  .cfs-component { text-align: center; padding: 0.75rem; background: var(--navy); border-radius: 8px; }
  .cfs-component-value { font-size: 1.1rem; font-weight: 700; color: #fff; }
  .cfs-component-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }

  /* Loading */
  .loading { text-align: center; padding: 3rem; color: var(--text-dim); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Back button */
  .back-btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0.8rem; background: var(--navy-light); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    font-family: inherit; margin-bottom: 1.5rem;
  }
  .back-btn:hover { color: var(--text); border-color: #3a4068; }

  /* Voting position */
  .vote-yea { color: var(--green); font-weight: 600; }
  .vote-nay { color: var(--red); font-weight: 600; }
  .vote-present { color: var(--amber); }
  .vote-not_voting { color: var(--text-dim); }

  /* Footer */
  .footer {
    border-top: 1px solid var(--border); padding: 2rem 1.5rem;
    text-align: center; color: var(--text-dim); font-size: 0.8rem;
  }

  /* Waitlist section */
  .waitlist-banner {
    background: linear-gradient(135deg, var(--navy-light), var(--navy-mid));
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 2rem; text-align: center; margin-bottom: 2rem;
  }
  .waitlist-banner h2 { color: #fff; font-size: 1.3rem; margin-bottom: 0.5rem; }
  .waitlist-banner p { color: var(--text-dim); margin-bottom: 1rem; }
  .waitlist-form { display: flex; gap: 0.5rem; justify-content: center; max-width: 400px; margin: 0 auto; }
  .waitlist-input {
    flex: 1; padding: 0.6rem 1rem; background: var(--navy); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 0.9rem; font-family: inherit; outline: none;
  }
  .waitlist-input:focus { border-color: var(--blue); }
  .waitlist-submit {
    padding: 0.6rem 1.5rem; background: var(--blue); color: #fff; border: none;
    border-radius: 8px; font-weight: 600; cursor: pointer; font-family: inherit;
    font-size: 0.9rem;
  }
  .waitlist-submit:hover { background: var(--blue-dark); }

  /* Contact Actions */
  .contact-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
  .contact-btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem;
    font-weight: 600; cursor: pointer; border: 1px solid var(--border);
    font-family: inherit; transition: all 0.2s;
  }
  .contact-btn-call { background: rgba(16,185,129,0.1); color: #10b981; border-color: rgba(16,185,129,0.3); }
  .contact-btn-call:hover { background: rgba(16,185,129,0.2); }
  .contact-btn-email { background: rgba(59,130,246,0.1); color: #60a5fa; border-color: rgba(59,130,246,0.3); }
  .contact-btn-email:hover { background: rgba(59,130,246,0.2); }
  .contact-btn-tweet { background: rgba(139,92,246,0.1); color: #a78bfa; border-color: rgba(139,92,246,0.3); }
  .contact-btn-tweet:hover { background: rgba(139,92,246,0.2); }
  .contact-btn-web { background: rgba(245,158,11,0.1); color: #fbbf24; border-color: rgba(245,158,11,0.3); }
  .contact-btn-web:hover { background: rgba(245,158,11,0.2); }

  /* Modal */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 1rem;
  }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 2rem; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto;
  }
  .modal h2 { color: #fff; font-size: 1.2rem; margin-bottom: 1rem; }
  .modal-close {
    float: right; background: none; border: none; color: var(--text-dim);
    font-size: 1.5rem; cursor: pointer; padding: 0; line-height: 1;
  }
  .modal-close:hover { color: #fff; }

  /* Auth Form */
  .auth-form { display: flex; flex-direction: column; gap: 0.75rem; }
  .auth-input {
    padding: 0.6rem 1rem; background: var(--navy); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 0.9rem; font-family: inherit; outline: none;
  }
  .auth-input:focus { border-color: var(--blue); }
  .auth-btn {
    padding: 0.7rem 1.5rem; background: var(--blue); color: #fff; border: none;
    border-radius: 8px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 0.9rem;
  }
  .auth-btn:hover { background: var(--blue-dark); }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-toggle { color: var(--blue); cursor: pointer; text-align: center; font-size: 0.85rem; margin-top: 0.5rem; }

  /* Watchlist Button */
  .watchlist-btn {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.8rem;
    cursor: pointer; border: 1px solid var(--border); background: var(--navy-light);
    color: var(--text-dim); font-family: inherit; transition: all 0.2s;
  }
  .watchlist-btn:hover { border-color: var(--gold); color: var(--gold); }
  .watchlist-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(251,191,36,0.1); }

  /* Subject Tags */
  .subject-tag {
    display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px;
    font-size: 0.7rem; background: rgba(59,130,246,0.1); color: #60a5fa;
    border: 1px solid rgba(59,130,246,0.2); margin: 0.1rem;
  }

  /* Template Card */
  .template-card {
    background: var(--navy); border: 1px solid var(--border); border-radius: 8px;
    padding: 1rem; margin-bottom: 0.75rem; cursor: pointer; transition: all 0.2s;
  }
  .template-card:hover { border-color: var(--blue); }
  .template-text {
    background: var(--navy-mid); padding: 0.75rem; border-radius: 6px;
    font-size: 0.85rem; color: var(--text); line-height: 1.5; white-space: pre-wrap;
    margin-top: 0.5rem;
  }

  /* Onboarding */
  .interest-chip {
    display: inline-flex; align-items: center; padding: 0.4rem 0.8rem;
    border-radius: 20px; font-size: 0.85rem; cursor: pointer;
    border: 1px solid var(--border); background: var(--navy-light);
    color: var(--text-dim); transition: all 0.2s; margin: 0.2rem;
  }
  .interest-chip.selected { border-color: var(--blue); color: #fff; background: rgba(59,130,246,0.15); }

  /* Community stat */
  .community-stat {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.8rem; color: var(--text-dim); margin-top: 0.5rem;
  }

  /* PsyOp Scanner */
  .scanner-input-area {
    width: 100%; min-height: 160px; max-height: 400px; resize: vertical;
    background: var(--navy); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 1rem; font-size: 0.9rem; font-family: inherit;
    line-height: 1.6; outline: none;
  }
  .scanner-input-area:focus { border-color: var(--blue); }
  .scanner-input-area::placeholder { color: var(--text-dim); }
  .scan-btn {
    padding: 0.7rem 2rem; background: linear-gradient(135deg, #ef4444, #dc2626);
    color: #fff; border: none; border-radius: 8px; font-weight: 700;
    font-size: 1rem; cursor: pointer; font-family: inherit; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 0.5rem;
  }
  .scan-btn:hover { background: linear-gradient(135deg, #dc2626, #b91c1c); transform: translateY(-1px); }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .indicator-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
  .indicator-card {
    background: var(--navy); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.25rem; transition: border-color 0.2s;
  }
  .indicator-card:hover { border-color: #3a4068; }
  .indicator-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
  .indicator-name { font-weight: 600; font-size: 0.9rem; color: #fff; }
  .indicator-score-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 40px; height: 28px; border-radius: 14px;
    font-weight: 700; font-size: 0.8rem; padding: 0 0.5rem;
  }
  .indicator-score-badge.green { background: rgba(16,185,129,0.15); color: #34d399; }
  .indicator-score-badge.yellow { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .indicator-score-badge.red { background: rgba(239,68,68,0.15); color: #f87171; }
  .indicator-bar-bg { height: 6px; background: var(--navy-mid); border-radius: 3px; overflow: hidden; margin: 0.5rem 0; }
  .indicator-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .indicator-bar-fill.green { background: linear-gradient(90deg, #10b981, #34d399); }
  .indicator-bar-fill.yellow { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .indicator-bar-fill.red { background: linear-gradient(90deg, #ef4444, #f87171); }
  .indicator-explanation { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; }
  .overall-score-ring {
    width: 120px; height: 120px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; flex-direction: column;
    font-weight: 800; font-size: 2rem; color: #fff; flex-shrink: 0;
  }
  .overall-score-ring.green { background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(16,185,129,0.05)); border: 3px solid #10b981; }
  .overall-score-ring.yellow { background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.05)); border: 3px solid #f59e0b; }
  .overall-score-ring.red { background: linear-gradient(135deg, rgba(239,68,68,0.2), rgba(239,68,68,0.05)); border: 3px solid #ef4444; }
  .overall-score-label { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.15rem; }
  .scanner-disclaimer {
    background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2);
    border-radius: 8px; padding: 1rem 1.25rem; font-size: 0.8rem; color: var(--text-dim);
    line-height: 1.6; margin-top: 1.5rem;
  }
  .scanner-disclaimer strong { color: #fbbf24; }
  .feedback-btns { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .feedback-btn {
    padding: 0.4rem 1rem; border: 1px solid var(--border); background: var(--navy-light);
    color: var(--text-dim); border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    font-family: inherit; transition: all 0.2s;
  }
  .feedback-btn:hover { border-color: var(--blue); color: var(--text); }
  .feedback-btn.selected { border-color: var(--blue); color: #fff; background: rgba(59,130,246,0.15); }

  /* PsyOp Feed - Topic-Paired Narrative Table */
  .feed-section { margin-top: 2.5rem; }
  .feed-section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.75rem;
  }
  .feed-section-title {
    font-size: 1.3rem; font-weight: 800; color: #fff;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .feed-live-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #10b981;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(16,185,129,0); }
  }
  .feed-timestamp {
    font-size: 0.78rem; color: var(--text-dim);
    display: flex; align-items: center; gap: 0.4rem;

  .feed-psyop-label {
    font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .feed-psyop-label.high { color: #f87171; }
  .feed-psyop-label.moderate { color: #fbbf24; }
  .feed-psyop-label.low { color: #34d399; }
  .feed-indicator-tag {

  /* Control Grid Scorecard */
  .cg-scorecard { margin-top: 1rem; }

    display: flex; align-items: center; justify-content: space-between;

  }

    border-radius: var(--radius); padding: 1rem 1.5rem;
  }
  .cg-net-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .cg-net-value { font-size: 2.2rem; font-weight: 900; line-height: 1; }
  .cg-net-value.positive { color: #f87171; }
  .cg-net-value.negative { color: #34d399; }

  .cg-columns {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
  }
  @media (max-width: 768px) {

  }
  .cg-column { }
  .cg-column-title {
    font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; padding: 0.75rem 1rem;

  .cg-column-title.against-col { background: rgba(16,185,129,0.1); color: #34d399; border: 1px solid rgba(16,185,129,0.2); border-bottom: none; }
  .cg-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1rem; border: 1px solid var(--border);
    border-top: none; background: var(--card); cursor: pointer;
    transition: background 0.2s; gap: 0.75rem;
  }
  .cg-item:last-child { border-radius: 0 0 var(--radius) var(--radius); }
  .cg-item:hover { background: var(--navy-mid); }
  .cg-item-title { font-size: 0.88rem; font-weight: 500; color: var(--text); flex: 1; }
  .cg-item-score {
    font-size: 1rem; font-weight: 800; min-width: 40px; text-align: right;

  }
  .cg-item-score.for-score { color: #f87171; }
  .cg-item-score.against-score { color: #34d399; }
  .cg-item-detail {
    padding: 0.75rem 1rem; background: var(--navy); border: 1px solid var(--border);

  }
  .cg-item-meta {

  }
  .cg-item-tag {

  }
  .cg-item-tag.bill { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .cg-item-tag.news { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .cg-item-tag.policy { background: rgba(139,92,246,0.15); color: #a78bfa; }
  .cg-item-tag.executive_order { background: rgba(236,72,153,0.15); color: #f472b6; }
  .cg-item-tag.international { background: rgba(6,182,212,0.15); color: #22d3ee; }
  .cg-category-breakdown {

    gap: 0.75rem; margin-top: 1.5rem;
  }
  .cg-cat-card {

    padding: 0.75rem; text-align: center;
  }
  .cg-cat-name {
    font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.05em; font-weight: 600; margin-bottom: 0.3rem;
  }

  .cg-scale-legend {
    display: flex; justify-content: space-between; align-items: center;

    border-radius: 8px; font-size: 0.72rem; color: var(--text-dim);

  /* Composite Risk Score */
  .cg-risk-panel {
    background: var(--navy-mid); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1.5rem; margin-bottom: 1.5rem;
  }
  .cg-risk-gauge {
    display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.25rem;
  }
  .cg-risk-circle {
    width: 120px; height: 120px; border-radius: 50%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; border: 4px solid;
    flex-shrink: 0;
  }
  .cg-risk-circle.low { border-color: #34d399; background: rgba(16,185,129,0.08); }
  .cg-risk-circle.guarded { border-color: #60a5fa; background: rgba(96,165,250,0.08); }
  .cg-risk-circle.transitional { border-color: #fbbf24; background: rgba(245,158,11,0.08); }
  .cg-risk-circle.high { border-color: #f97316; background: rgba(249,115,22,0.08); }
  .cg-risk-circle.severe { border-color: #ef4444; background: rgba(239,68,68,0.08); }
  .cg-risk-pct { font-size: 2rem; font-weight: 900; line-height: 1; }
  .cg-risk-pct.low { color: #34d399; }
  .cg-risk-pct.guarded { color: #60a5fa; }
  .cg-risk-pct.transitional { color: #fbbf24; }
  .cg-risk-pct.high { color: #f97316; }
  .cg-risk-pct.severe { color: #ef4444; }
  .cg-risk-band { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }
  .cg-risk-info { flex: 1; }
  .cg-risk-formula {
    font-size: 0.78rem; color: var(--text-dim); margin-top: 0.5rem; line-height: 1.6;
    background: var(--navy-light); padding: 0.6rem 0.8rem; border-radius: 6px; font-family: monospace;
  }
  .cg-variables { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; margin-top: 1rem; }
  .cg-var-card {
    background: var(--navy-light); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem;
  }
  .cg-var-label { font-size: 0.72rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.35rem; }
  .cg-var-score-row { display: flex; align-items: center; gap: 0.5rem; }
  .cg-var-score { font-size: 1.3rem; font-weight: 900; min-width: 2.5rem; }
  .cg-var-bar { flex: 1; height: 8px; background: var(--navy-mid); border-radius: 4px; position: relative; overflow: hidden; }
  .cg-var-bar-fill { position: absolute; top: 0; height: 100%; border-radius: 4px; transition: width 0.5s; }
  .cg-var-rationale { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.4rem; line-height: 1.4; }

    grid-column: 1 / -1;

  .cg-overall-analysis {
    margin-top: 1rem; padding: 0.85rem 1rem; background: var(--navy-light);
    border-left: 3px solid rgba(255,255,255,0.2); border-radius: 0 8px 8px 0;
    font-size: 0.85rem; color: var(--text); line-height: 1.5;
  }

  /* Control Grid Actors */
  .cg-actors-section { margin-top: 2.5rem; }
  .cg-actors-header {
    display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;
    padding: 0.75rem 1rem; border-radius: var(--radius); font-weight: 800; font-size: 1.15rem;
  }
  .cg-actors-header.proponent { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
  .cg-actors-header.opponent { background: rgba(16,185,129,0.1); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
  .cg-actor-type-group { margin-bottom: 1.5rem; }
  .cg-actor-type-label {
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); margin-bottom: 0.5rem; padding-left: 0.25rem;
  }
  .cg-actor-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.75rem; }
  .cg-actor-card {
    background: var(--navy-mid); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 0.85rem 1rem; cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  .cg-actor-card:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); }
  .cg-actor-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
  .cg-actor-name { font-size: 0.95rem; font-weight: 700; color: #fff; }
  .cg-actor-name a { color: inherit; text-decoration: underline; text-decoration-color: rgba(255,255,255,0.3); }
  .cg-actor-name a:hover { text-decoration-color: #fff; }
  .cg-actor-influence {
    font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.45rem; border-radius: 4px; white-space: nowrap;
  }
  .cg-actor-influence.high { background: rgba(239,68,68,0.15); color: #f87171; }
  .cg-actor-influence.med { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .cg-actor-influence.low { background: rgba(107,114,128,0.15); color: #9ca3af; }
  .cg-actor-meta {
    display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.3rem; font-size: 0.72rem; color: var(--text-dim);
  }
  .cg-actor-meta span { background: var(--navy-light); padding: 0.1rem 0.4rem; border-radius: 3px; }
  .cg-actor-summary { font-size: 0.82rem; color: var(--text); margin-top: 0.5rem; line-height: 1.4; }
  .cg-actor-analysis { font-size: 0.78rem; color: var(--text-dim); margin-top: 0.4rem; font-style: italic; }

  /* State Breakdown */
  .cg-state-section { margin-top: 2.5rem; }
  .cg-state-header {
    font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .cg-state-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.5rem; }
  .cg-state-card {
    background: var(--navy-mid); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 0.6rem 0.75rem; text-align: center;
  }
  .cg-state-name { font-size: 0.85rem; font-weight: 700; color: #fff; }
  .cg-state-counts { display: flex; justify-content: center; gap: 0.75rem; margin-top: 0.3rem; font-size: 0.72rem; }
  .cg-state-pro { color: #f87171; }
  .cg-state-opp { color: #34d399; }
  .cg-state-card.pro-dominant { border-color: rgba(239,68,68,0.3); }
  .cg-state-card.opp-dominant { border-color: rgba(16,185,129,0.3); }
  .cg-state-card.mixed { border-color: rgba(245,158,11,0.3); }

  /* Network Graph */
  .cg-network-container {
    background: var(--navy-mid); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1rem; margin-top: 1rem; position: relative; overflow: hidden;
  }
  .cg-network-container svg { width: 100%; height: 500px; display: block; }
  .cg-network-legend {
    display: flex; flex-wrap: wrap; gap: 1rem; padding: 0.75rem 0; font-size: 0.75rem; color: var(--text-dim);
  }
  .cg-network-legend-item { display: flex; align-items: center; gap: 0.35rem; }
  .cg-network-legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .cg-network-tooltip {
    position: absolute; background: var(--navy-deep); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.6rem 0.8rem; font-size: 0.78rem; color: var(--text);
    pointer-events: none; opacity: 0; transition: opacity 0.2s; max-width: 280px; z-index: 100;
  }
  .cg-network-tooltip.visible { opacity: 1; }

  /* Submit Evidence */
  .cg-submit-panel {
    background: var(--navy-mid); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1.25rem; margin-top: 1.5rem;
  }
  .cg-submit-panel h4 { color: #fff; font-size: 1rem; font-weight: 700; margin-bottom: 0.75rem; }
  .cg-submit-input {
    width: 100%; background: var(--navy-light); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 0.75rem; font-size: 0.88rem; resize: vertical; min-height: 80px;
    font-family: inherit;
  }
  .cg-submit-input:focus { outline: none; border-color: #fbbf24; }
  .cg-submit-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; align-items: center; }
  .cg-submit-url {
    flex: 1; background: var(--navy-light); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 0.5rem 0.75rem; font-size: 0.85rem; font-family: inherit;
  }
  .cg-submit-url:focus { outline: none; border-color: #fbbf24; }
  .cg-submit-btn {
    padding: 0.5rem 1.25rem; background: #fbbf24; color: #000; font-weight: 700; border: none;
    border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: background 0.2s;
  }

  .cg-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .cg-submit-status { font-size: 0.8rem; margin-top: 0.5rem; }

  /* Notification Bell */
  .notif-bell {
    position: relative; background: none; border: none; color: var(--text-dim);
    font-size: 1.2rem; cursor: pointer; padding: 0.3rem; transition: color 0.2s;
  }
  .notif-bell:hover { color: #fff; }
  .notif-badge {
    position: absolute; top: -2px; right: -4px; width: 16px; height: 16px;
    border-radius: 50%; background: var(--red); color: #fff; font-size: 0.6rem;
    font-weight: 700; display: flex; align-items: center; justify-content: center;
  }
  .notif-panel {
    position: absolute; top: calc(100% + 8px); right: 0; width: 360px; max-height: 420px;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 150; overflow: hidden;
    display: flex; flex-direction: column;

  .notif-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
    font-size: 0.9rem; font-weight: 600; color: #fff;
  }
  .notif-list { overflow-y: auto; flex: 1; max-height: 340px; }

    padding: 0.75rem 1rem; border-bottom: 1px solid rgba(42,47,78,0.3);
    cursor: pointer; transition: background 0.15s;
  }
  .notif-item:hover { background: var(--navy-light); }
  .notif-item.unread { border-left: 3px solid var(--blue); }
  .notif-item-title { font-size: 0.85rem; font-weight: 600; color: #fff; margin-bottom: 0.15rem; }
  .notif-item-body { font-size: 0.78rem; color: var(--text-dim); line-height: 1.4; }
  .notif-item-time { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.25rem; }
  .notif-empty { padding: 2rem; text-align: center; color: var(--text-dim); font-size: 0.85rem; }

  /* Toggle Switch */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.6rem 0; border-bottom: 1px solid rgba(42,47,78,0.3);
  }
  .toggle-label { font-size: 0.9rem; color: var(--text); }
  .toggle-desc { font-size: 0.75rem; color: var(--text-dim); }
  .toggle-switch {
    width: 44px; height: 24px; border-radius: 12px; background: var(--navy-mid);
    cursor: pointer; position: relative; border: 1px solid var(--border); transition: all 0.2s;
    flex-shrink: 0;
  }
  .toggle-switch.on { background: var(--blue); border-color: var(--blue); }
  .toggle-switch::after {
    content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
    border-radius: 50%; background: #fff; transition: transform 0.2s;
  }
  .toggle-switch.on::after { transform: translateX(20px); }

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const API_BASE = 'https://vsocmojximnnlrzdmeoz.supabase.co/functions/v1/civic-api';
const SUPABASE_URL = 'https://vsocmojximnnlrzdmeoz.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzb2Ntb2p4aW1ubmxyemRtZW96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTE2MjgsImV4cCI6MjA5MDEyNzYyOH0.y3fC43nOBv4ZMfiaPzPDvVZxwlERS_IFdclHZ1jbQv0';

async function api(params) {
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`${API_BASE}?${qs}`);
  return res.json();
}

async function apiPost(params, body) {
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`${API_BASE}?${qs}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return res.json();
}

// Supabase Auth helpers (using REST API directly, no SDK needed)
const AUTH_URL = `${SUPABASE_URL}/auth/v1`;
async function authSignUp(email, password) {
  const res = await fetch(`${AUTH_URL}/signup`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY },
    body: JSON.stringify({ email, password }),
  });
  return res.json();
}
async function authSignIn(email, password) {
  const res = await fetch(`${AUTH_URL}/token?grant_type=password`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY },
    body: JSON.stringify({ email, password }),
  });
  return res.json();
}
async function authSignOut(token) {
  await fetch(`${AUTH_URL}/logout`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'apikey': ANON_KEY },
  });
}

// Simple auth state (in-memory for session)
let currentUser = null;
let currentToken = null;
function setAuthState(user, token) {
  currentUser = user;
  currentToken = token;
}
function getUser() { return currentUser; }
function getToken() { return currentToken; }

// CAS (Citizen Accessibility Score) helpers
function cfsLevel(score) {
  if (score === null || score === undefined) return 'none';
  if (score >= 70) return 'high';
  if (score >= 40) return 'mid';
  return 'low';
}

function trendIcon(trend) {
  switch (trend) {
    case 'rising': return '\u2191';
    case 'falling': return '\u2193';
    case 'stable': return '\u2192';
    case 'new': return '\u2605';
    default: return '';
  }
}

function CfsBadge({ score, small }) {
  const level = cfsLevel(score);
  const cls = `cfs-badge ${level}${small ? ' cfs-badge-sm' : ''}`;
  return <div className={cls}>{score !== null && score !== undefined ? Math.round(score) : 'N/A'}</div>;
}

function PartyBadge({ party }) {
  return <span className={`party-badge party-${party || 'I'}`}>{party || '?'}</span>;
}

function StatusBadge({ status }) {
  const cls = `status-badge status-${(status || 'introduced').replace(/\s+/g, '_').toLowerCase()}`;
  return <span className={cls}>{status || 'Unknown'}</span>;
}

function VotePosition({ position }) {
  return <span className={`vote-${position}`}>{position.replace('_', ' ')}</span>;
}

// ======= AUTH MODAL =======
function AuthModal({ onClose, onAuth }) {
  const [mode, setMode] = useState('signin');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [message, setMessage] = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(''); setMessage(''); setLoading(true);
    try {
      if (mode === 'signup') {
        const data = await authSignUp(email, password);
        if (data.error) { setError(data.error.message || data.msg || 'Sign up failed'); setLoading(false); return; }
        setMessage('Account created! Check your email to confirm, then sign in.');
        setMode('signin');
      } else {
        const data = await authSignIn(email, password);
        if (data.error) { setError(data.error_description || data.msg || 'Sign in failed'); setLoading(false); return; }
        setAuthState(data.user, data.access_token);
        onAuth(data.user);
        onClose();
      }
    } catch (e) { setError('Network error. Try again.'); }
    setLoading(false);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>&times;</button>
        <h2>{mode === 'signin' ? 'Sign In' : 'Create Account'}</h2>
        {message && <div style={{color:'var(--green)',fontSize:'0.85rem',marginBottom:'0.5rem'}}>{message}</div>}
        {error && <div style={{color:'var(--red)',fontSize:'0.85rem',marginBottom:'0.5rem'}}>{error}</div>}
        <form className="auth-form" onSubmit={handleSubmit}>
          <input className="auth-input" type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} required />
          <input className="auth-input" type="password" placeholder="Password (min 6 chars)" value={password} onChange={e => setPassword(e.target.value)} required minLength={6} />
          <button className="auth-btn" type="submit" disabled={loading}>{loading ? 'Please wait...' : mode === 'signin' ? 'Sign In' : 'Create Account'}</button>
        </form>
        <div className="auth-toggle" onClick={() => { setMode(mode === 'signin' ? 'signup' : 'signin'); setError(''); setMessage(''); }}>
          {mode === 'signin' ? "Don't have an account? Sign up" : 'Already have an account? Sign in'}
        </div>
      </div>
    </div>
  );
}

function OnboardingModal({ user, onClose }) {
  const [step, setStep] = useState(1);
  const [state, setState] = useState('');
  const [district, setDistrict] = useState('');
  const [interests, setInterests] = useState([]);
  const [saving, setSaving] = useState(false);

  const allInterests = ['Healthcare','Education','Defense','Economy','Immigration','Environment','Gun Rights','Civil Rights','Technology','Criminal Justice','Foreign Policy','Social Security','Taxes','Housing','Veterans'];
  const states = [
    'Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut','Delaware','Florida','Georgia',
    'Hawaii','Idaho','Illinois','Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland',
    'Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire','New Jersey',
    'New Mexico','New York','North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina',
    'South Dakota','Tennessee','Texas','Utah','Vermont','Virginia','Washington','West Virginia','Wisconsin','Wyoming'
  ];

  const toggleInterest = (i) => setInterests(prev => prev.includes(i) ? prev.filter(x => x !== i) : [...prev, i]);

  const save = async () => {
    setSaving(true);
    // Save profile via Supabase REST
    await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${user.id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY, 'Authorization': `Bearer ${getToken()}`, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ state_code: state, district: district || null, interests, onboarding_complete: true }),
    });
    setSaving(false);
    onClose();
  };

  return (
    <div className="modal-overlay">
      <div className="modal">
        <h2>Welcome to GlassPalace!</h2>
        {step === 1 && (
          <div>
            <p style={{color:'var(--text-dim)',marginBottom:'1rem'}}>Tell us where you are so we can show your representatives.</p>
            <select className="auth-input" style={{width:'100%',marginBottom:'0.75rem'}} value={state} onChange={e => setState(e.target.value)}>
              <option value="">Select your state...</option>
              {states.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <input className="auth-input" style={{width:'100%'}} placeholder="District number (optional)" value={district} onChange={e => setDistrict(e.target.value)} />
            <button className="auth-btn" style={{width:'100%',marginTop:'1rem'}} onClick={() => setStep(2)} disabled={!state}>Next</button>
          </div>
        )}
        {step === 2 && (
          <div>
            <p style={{color:'var(--text-dim)',marginBottom:'1rem'}}>What topics interest you? We'll highlight relevant legislation.</p>

              ))}
            </div>
            <div style={{display:'flex',gap:'0.5rem'}}>
              <button className="auth-btn" style={{flex:1,background:'var(--navy-mid)'}} onClick={() => setStep(1)}>Back</button>
              <button className="auth-btn" style={{flex:1}} onClick={save} disabled={saving}>{saving ? 'Saving...' : 'Get Started'}</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function ContactModal({ legislator, onClose, onContact }) {

  const templates = [
    {
      label: 'Support a Bill',
      subject: `Support for Legislation - ${leg.state_code} Constituent`,

      label: 'Oppose a Bill',

  const copyText = (text, label) => {

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>

// ======= WAITLIST FORM =======
function WaitlistForm() {
  const [email, setEmail] = useState('');
  const [status, setStatus] = useState('');

  async function submit(e) {
    e.preventDefault();
    if (!email) return;
    setStatus('sending');
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/waitlist-signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, product: 'civic', source: 'civic-app' }),
      });
      const data = await res.json();
      setStatus(data.status === 'already_registered' ? 'already' : 'success');
      setEmail('');
    } catch {
      setStatus('error');
    }
  }

  if (status === 'success') return <p style={{color:'var(--green)', fontWeight:600}}>You're on the list!</p>;
  if (status === 'already') return <p style={{color:'var(--amber)', fontWeight:600}}>You're already signed up!</p>;

  return (
    <form className="waitlist-form" onSubmit={submit}>
      <input className="waitlist-input" type="email" placeholder="your@email.com" value={email} onChange={e => setEmail(e.target.value)} required />
      <button className="waitlist-submit" type="submit" disabled={status === 'sending'}>{status === 'sending' ? 'Joining...' : 'Join Waitlist'}</button>
    </form>
  );
}

// ======= BILLS LIST =======
function BillsList({ setView }) {
  const [bills, setBills] = useState([]);
  const [pagination, setPagination] = useState({});
  const [loading, setLoading] = useState(true);
  const [filters, setFilters] = useState({ page: 1, status: 'all', search: '', sort: '', order: 'desc', subject: '' });
  const [subjects, setSubjects] = useState([]);

  useEffect(() => {
    api({ route: 'subjects' }).then(d => setSubjects(d.subjects || []));
  }, []);

  const load = useCallback(() => {
    setLoading(true);
    const params = { route: 'bills', page: filters.page, limit: 20 };
    if (filters.status !== 'all') params.status = filters.status;
    if (filters.search) params.search = filters.search;
    if (filters.sort) params.sort = filters.sort;
    if (filters.order) params.order = filters.order;
    if (filters.subject) params.subject = filters.subject;
    api(params).then(d => {
      setBills(d.bills || []);
      setPagination(d.pagination || {});
      setLoading(false);
    });
  }, [filters]);

  useEffect(() => { load(); }, [load]);

  return (
    <div>
      <h1 style={{fontSize:'1.5rem', fontWeight:800, color:'#fff', marginBottom:'1.5rem'}}>\ud83d\udcdc Legislation Tracker</h1>

      <div className="filters">
        <input
          className="waitlist-input"
          style={{maxWidth:250}}
          placeholder="Search bills..."
          value={filters.search}
          onChange={e => setFilters(f => ({ ...f, search: e.target.value, page: 1 }))}
        />
        <select className="filter-select" value={filters.status} onChange={e => setFilters(f => ({ ...f, status: e.target.value, page: 1 }))}>
          <option value="all">All Statuses</option>
          <option value="introduced">Introduced</option>
          <option value="committee">In Committee</option>
          <option value="passed_house">Passed House</option>
          <option value="passed_senate">Passed Senate</option>
          <option value="passed_both">Passed Both</option>
          <option value="signed">Signed</option>
          <option value="vetoed">Vetoed</option>
        </select>
        {subjects.length > 0 && (
          <select className="filter-select" value={filters.subject} onChange={e => setFilters(f => ({ ...f, subject: e.target.value, page: 1 }))}>
            <option value="">All Subjects</option>
            {subjects.slice(0, 30).map(s => <option key={s.name} value={s.name}>{s.name} ({s.count})</option>)}
          </select>
        )}
      </div>

      {loading ? (
        <div className="loading"><div className="spinner"></div></div>
      ) : bills.length === 0 ? (
        <div className="card" style={{textAlign:'center', padding:'3rem'}}>
          <p style={{color:'var(--text-dim)'}}>No bills found. {pagination.total === 0 ? 'Run data ingestion to load bills.' : 'Try adjusting your filters.'}</p>
        </div>
      ) : (
        <div className="card" style={{padding:0}}>
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style={{cursor:'pointer'}} onClick={() => setFilters(f => ({...f, sort: 'freedom_score', order: f.sort === 'freedom_score' && f.order === 'desc' ? 'asc' : 'desc', page: 1}))}>
                    Freedom {filters.sort === 'freedom_score' ? (filters.order === 'desc' ? '\u25bc' : '\u25b2') : ''}
                  </th>
                  <th>Bill</th>
                  <th>Title</th>
                  <th>Sponsor</th>
                  <th>Status</th>
                  <th>Subject</th>
                  <th>Last Action</th>
                </tr>
              </thead>
              <tbody>
                {bills.map(bill => (
                  <tr key={bill.id} className="clickable" onClick={() => setView({ page: 'bill', id: bill.id })}>
                    <td><CfsBadge score={bill.freedom_score} small /></td>
                    <td><span className="bill-number">{bill.bill_number}</span></td>
                    <td style={{maxWidth:300}}>
                      <div style={{fontWeight:500, color:'#fff', fontSize:'0.85rem'}}>{bill.short_title || bill.title}</div>
                    </td>
                    <td>
                      {bill.sponsor ? (
                        <div style={{display:'flex',alignItems:'center',gap:'0.4rem'}}>
                          <PartyBadge party={bill.sponsor.party} />
                          <span style={{fontSize:'0.85rem'}}>{bill.sponsor.full_name}</span>
                        </div>
                      ) : <span style={{color:'var(--text-dim)'}}>—</span>}
                    </td>
                    <td><StatusBadge status={bill.status} /></td>
                    <td>{bill.subjects && bill.subjects.length > 0 ? bill.subjects.slice(0,2).map(s => <span key={s} className="subject-tag">{s}</span>) : <span style={{color:'var(--text-dim)'}}>—</span>}</td>
                    <td style={{fontSize:'0.8rem', color:'var(--text-dim)'}}>{bill.last_action_date || '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {pagination.pages > 1 && (
        <div className="pagination">
          <button className="page-btn" disabled={filters.page <= 1} onClick={() => setFilters(f => ({ ...f, page: f.page - 1 }))}>Prev</button>
          <span style={{color:'var(--text-dim)', fontSize:'0.85rem'}}>Page {pagination.page} of {pagination.pages}</span>
          <button className="page-btn" disabled={filters.page >= pagination.pages} onClick={() => setFilters(f => ({ ...f, page: f.page + 1 }))}>Next</button>
        </div>
      )}
    </div>
  );
}

                {spectrum.position > 0 ? '+' : ''}{spectrum.position}

                    <span style={{fontSize:'0.85rem'}}>{c.full_name}</span>
                    <span style={{fontSize:'0.75rem',color:'var(--text-dim)',marginLeft:'auto'}}>{c.state_code}</span>

                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="card">
            <div className="card-header"><span className="card-title">Roll Call Votes</span></div>
            {votes.length === 0 ? <p style={{color:'var(--text-dim)'}}>No roll call votes recorded.</p> : (
              votes.map((v, i) => (
                <div key={i} style={{padding:'0.5rem 0', borderBottom:'1px solid var(--border)', fontSize:'0.85rem'}}>
                  <div style={{display:'flex',justifyContent:'space-between'}}>
                    <span style={{fontWeight:600, color:'#fff'}}>{v.chamber} Vote #{v.vote_number}</span>
                    <span style={{color:'var(--text-dim)', fontSize:'0.75rem'}}>{v.vote_date}</span>
                  </div>
                  <div style={{color:'var(--text-dim)'}}>{v.question}</div>
                  <div style={{marginTop:'0.25rem'}}>
                    Result: <strong style={{color: v.result?.toLowerCase().includes('pass') ? 'var(--green)' : 'var(--red)'}}>{v.result}</strong>
                    <span style={{marginLeft:'0.75rem',fontSize:'0.8rem'}}>Yea: {v.yea_count} | Nay: {v.nay_count} | NV: {v.not_voting_count}</span>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ======= LEGISLATOR DETAIL =======
function LegislatorDetail({ id, setView }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    api({ route: 'legislator', id }).then(d => { setData(d); setLoading(false); });
  }, [id]);

  if (loading) return <div className="loading"><div className="spinner"></div></div>;
  if (!data || !data.legislator) return <div className="card"><p>Representative not found.</p></div>;

  const { legislator: leg, cfs_history = [], sponsored_bills = [], recent_votes = [], voting_stats = {}, contact_count = 0 } = data;
  const cfsNotes = cfs_history[0]?.notes ? JSON.parse(cfs_history[0].notes) : null;
  const [showTemplates, setShowTemplates] = useState(false);
  const [contacted, setContacted] = useState(false);

  const logContact = (method) => {
    const user = getUser();
    if (user) {
      apiPost({ route: 'contact-log' }, { user_id: user.id, legislator_id: leg.id, contact_method: method });
    }
    setContacted(true);
    setTimeout(() => setContacted(false), 3000);
  };

  // CAS explainability
  const casFactors = [];
  if (leg.cfs_score !== null) {
    const hasWebsite = !!leg.website_url;
    const hasPhone = !!leg.phone;
    const hasOffice = !!leg.office_address;
    const contactItems = [hasWebsite, hasPhone, hasOffice].filter(Boolean).length;
    casFactors.push({ label: 'Transparency', weight: '40%', detail: `${contactItems}/3 contact channels (website, phone, office)`, score: Math.round(contactItems / 3 * 100) });
    const billCount = sponsored_bills.length;
    casFactors.push({ label: 'Sponsorship Activity', weight: '35%', detail: `${billCount} bill${billCount !== 1 ? 's' : ''} sponsored`, score: Math.min(100, billCount * 10) });
    const hasEmail = !!leg.email;
    const hasTwitter = !!leg.twitter_handle;
    const accessItems = [hasEmail, hasTwitter, hasWebsite, hasPhone].filter(Boolean).length;
    casFactors.push({ label: 'Accessibility', weight: '25%', detail: `${accessItems}/4 contact methods available`, score: Math.round(accessItems / 4 * 100) });
  }

  return (
    <div>
      <button className="back-btn" onClick={() => setView({ page: 'legislators' })}>\u2190 Back to Representatives</button>

      <div className="detail-header">
        {leg.photo_url ? (
          <img className="detail-photo" src={leg.photo_url} alt={leg.full_name} />
        ) : (
          <div className="detail-photo" style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:'2.5rem'}}>\ud83c\udfd4</div>
        )}
        <div className="detail-info" style={{flex:1}}>
          <h1>{leg.full_name}</h1>
          <div className="detail-meta">
            <span><PartyBadge party={leg.party} /> {leg.party}</span>
            <span>{leg.state_code}{leg.district ? `-${leg.district}` : ''}</span>
            <span style={{textTransform:'capitalize'}}>{leg.chamber}</span>
            {leg.title && <span>{leg.title}</span>}
          </div>
          <div className="contact-actions">
            {leg.phone && <a href={`tel:${leg.phone}`} className="contact-btn contact-btn-call" onClick={() => logContact('call')}>\ud83d\udcde Call {leg.phone}</a>}
            {leg.email ? <a href={`mailto:${leg.email}`} className="contact-btn contact-btn-email" onClick={() => logContact('email')}>\u2709 Email</a>
              : <button className="contact-btn contact-btn-email" onClick={() => setShowTemplates(true)}>\u2709 Message Templates</button>}
            {leg.twitter_handle && <a href={`https://x.com/${leg.twitter_handle}`} target="_blank" rel="noopener" className="contact-btn contact-btn-tweet" onClick={() => logContact('tweet')}>@ Post on X</a>}
            {leg.website_url && <a href={leg.website_url} target="_blank" rel="noopener" className="contact-btn contact-btn-web" onClick={() => logContact('website')}>\ud83c\udf10 Website</a>}
          </div>
          {contact_count > 0 && <div className="community-stat">\ud83d\udc65 {contact_count} citizen{contact_count !== 1 ? 's' : ''} contacted this rep</div>}
          {contacted && <div style={{color:'var(--green)',fontSize:'0.8rem',marginTop:'0.25rem'}}>Contact logged!</div>}
        </div>
        <div style={{textAlign:'center'}}>
          <CfsBadge score={leg.cfs_score} />
          <div style={{marginTop:'0.5rem'}}>
            <span className={`trend ${leg.cfs_trend || ''}`}>{trendIcon(leg.cfs_trend)} {leg.cfs_trend || 'pending'}</span>
          </div>

// ======= NOTIFICATIONS =======
const NOTIF_ENGINE_URL = 'https://vsocmojximnnlrzdmeoz.supabase.co/functions/v1/notification-engine';

function NotificationBell({ user, setView }) {
  const [open, setOpen] = useState(false);
  const [notifications, setNotifications] = useState([]);
  const [unreadCount, setUnreadCount] = useState(0);

  useEffect(() => {
    if (!user) return;
    fetch(`${NOTIF_ENGINE_URL}?user_id=${user.id}&unread=false`, {
      headers: { 'Authorization': `Bearer ${ANON_KEY}` },
    })
    .then(r => r.json())
    .then(d => {
      const notifs = d.notifications || [];
      setNotifications(notifs);
      setUnreadCount(notifs.filter(n => !n.read_at).length);
    })
    .catch(() => {});
  }, [user]);

  const markRead = async (id) => {
    await fetch(`${NOTIF_ENGINE_URL}?action=mark-read`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ANON_KEY}` },
      body: JSON.stringify({ notification_id: id, user_id: user.id }),
    });
    setNotifications(prev => prev.map(n => n.id === id ? { ...n, read_at: new Date().toISOString() } : n));
    setUnreadCount(prev => Math.max(0, prev - 1));
  };

  const markAllRead = async () => {
    await fetch(`${NOTIF_ENGINE_URL}?action=mark-all-read`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ANON_KEY}` },
      body: JSON.stringify({ user_id: user.id }),
    });
    setNotifications(prev => prev.map(n => ({ ...n, read_at: n.read_at || new Date().toISOString() })));
    setUnreadCount(0);
  };

  const timeAgo = (dateStr) => {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `${mins}m ago`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}h ago`;
    return `${Math.floor(hours / 24)}d ago`;
  };

  if (!user) return null;

  return (
    <div style={{position:'relative'}}>
      <button className="notif-bell" onClick={() => setOpen(!open)}>
        \uD83D\uDD14
        {unreadCount > 0 && <span className="notif-badge">{unreadCount > 9 ? '9+' : unreadCount}</span>}
      </button>
      {open && (
        <>
          <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:140}} onClick={() => setOpen(false)}></div>
          <div className="notif-panel">
            <div className="notif-panel-header">
              <span>Notifications</span>
              <div style={{display:'flex',gap:'0.5rem'}}>
                {unreadCount > 0 && <button style={{background:'none',border:'none',color:'var(--blue)',fontSize:'0.75rem',cursor:'pointer',fontFamily:'inherit'}} onClick={markAllRead}>Mark all read</button>}
                <button style={{background:'none',border:'none',color:'var(--text-dim)',fontSize:'0.75rem',cursor:'pointer',fontFamily:'inherit'}} onClick={() => { setOpen(false); setView({ page: 'notifications' }); }}>Settings</button>
              </div>
            </div>
            <div className="notif-list">
              {notifications.length === 0 ? (
                <div className="notif-empty">No notifications yet. Watch bills and representatives to get updates.</div>
              ) : notifications.slice(0, 20).map(n => (
                <div key={n.id} className={`notif-item ${!n.read_at ? 'unread' : ''}`} onClick={() => {
                  if (!n.read_at) markRead(n.id);
                  if (n.data?.bill_id) { setOpen(false); setView({ page: 'bill', id: n.data.bill_id }); }
                }}>
                  <div className="notif-item-title">{n.title}</div>
                  <div className="notif-item-body">{n.body}</div>
                  <div className="notif-item-time">{timeAgo(n.created_at)}</div>
                </div>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ======= PSYOP SCANNER =======
const SCANNER_URL = 'https://vsocmojximnnlrzdmeoz.supabase.co/functions/v1/psyop-scanner';
const INDICATOR_LABELS = {
  emotional_priming: { name: 'Emotional Priming', icon: '\u2764\uFE0F', desc: 'Language designed to trigger fear, anger, or outrage before presenting facts' },
  coordinated_repetition: { name: 'Coordinated Repetition', icon: '\uD83D\uDD01', desc: 'Identical talking points repeated across multiple sources or channels' },
  simplified_binaries: { name: 'Simplified Binaries', icon: '\u2696\uFE0F', desc: 'Complex issues reduced to us-vs-them or good-vs-evil framing' },
  anonymous_sourcing: { name: 'Anonymous Sourcing', icon: '\uD83D\uDC64', desc: 'Claims attributed to unnamed sources or vague authority figures' },
  selective_omission: { name: 'Selective Omission', icon: '\u2702\uFE0F', desc: 'Key context or counterarguments deliberately left out' },
  astroturfing: { name: 'Astroturfing Signals', icon: '\uD83C\uDF3F', desc: 'Manufactured grassroots support or artificially amplified voices' },
  behavioral_nudges: { name: 'Behavioral Nudges', icon: '\uD83E\uDDE0', desc: 'Subtle pushes toward a specific action or conclusion' },
};

function scannerColor(score) {
  if (score == null) return 'green';
  if (score >= 70) return 'red';
  if (score >= 40) return 'yellow';
  return 'green';
}

function PsyOpScanner({ user }) {
  const [inputText, setInputText] = useState('');
  const [inputUrl, setInputUrl] = useState('');
  const [inputMode, setInputMode] = useState('text'); // 'text' or 'url'
  const [scanning, setScanning] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [history, setHistory] = useState([]);

  const runScan = async () => {
    const content = inputMode === 'text' ? inputText.trim() : inputUrl.trim();
    if (!content) return;
    setScanning(true);
    setError(null);
    setResult(null);
    setFeedback(null);
    try {
      const body = {
        input_type: inputMode,
        ...(inputMode === 'text' ? { input_text: content } : { input_url: content }),
      };
      if (user) body.user_id = user.id;
      const res = await fetch(SCANNER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ANON_KEY}` },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setResult(data);
      setHistory(prev => [{ ...data, scanned_at: new Date().toISOString(), input_preview: content.slice(0, 80) }, ...prev].slice(0, 10));
    } catch (e) {
      setError(e.message || 'Scan failed. Please try again.');
    }
    setScanning(false);
  };

  const indicators = result ? [
    { key: 'emotional_priming', score: result.emotional_priming_score, color: result.emotional_priming_color, explanation: result.indicator_details?.emotional_priming },
    { key: 'coordinated_repetition', score: result.coordinated_repetition_score, color: result.coordinated_repetition_color, explanation: result.indicator_details?.coordinated_repetition },
    { key: 'simplified_binaries', score: result.simplified_binaries_score, color: result.simplified_binaries_color, explanation: result.indicator_details?.simplified_binaries },
    { key: 'anonymous_sourcing', score: result.anonymous_sourcing_score, color: result.anonymous_sourcing_color, explanation: result.indicator_details?.anonymous_sourcing },
    { key: 'selective_omission', score: result.selective_omission_score, color: result.selective_omission_color, explanation: result.indicator_details?.selective_omission },
    { key: 'astroturfing', score: result.astroturfing_score, color: result.astroturfing_color, explanation: result.indicator_details?.astroturfing },
    { key: 'behavioral_nudges', score: result.behavioral_nudges_score, color: result.behavioral_nudges_color, explanation: result.indicator_details?.behavioral_nudges },
  ] : [];

  return (
    <div>
      <div style={{marginBottom:'2rem'}}>
        <h1 style={{fontSize:'1.5rem',fontWeight:800,color:'#fff',marginBottom:'0.25rem',display:'flex',alignItems:'center',gap:'0.5rem'}}>
          PsyOp Scanner
        </h1>
        <p style={{color:'var(--text-dim)',fontSize:'0.9rem',maxWidth:'700px'}}>
          Analyze news articles, social media posts, or political messaging for manipulation tactics.
          Our AI examines 7 key indicators of psychological manipulation.
        </p>
      </div>

      {/* Input Section */}
      <div className="card" style={{marginBottom:'1.5rem'}}>
        <div style={{display:'flex',gap:'0.5rem',marginBottom:'1rem'}}>
          <button
            className={`nav-btn ${inputMode === 'text' ? 'active' : ''}`}
            onClick={() => setInputMode('text')}
            style={{fontSize:'0.85rem'}}
          >Paste Text</button>
          <button
            className={`nav-btn ${inputMode === 'url' ? 'active' : ''}`}
            onClick={() => setInputMode('url')}
            style={{fontSize:'0.85rem'}}
          >Enter URL</button>
        </div>

        {inputMode === 'text' ? (
          <textarea
            className="scanner-input-area"
            placeholder="Paste a news article, social media post, political speech, or any text you want to analyze for manipulation tactics..."
            value={inputText}
            onChange={e => setInputText(e.target.value)}
          />
        ) : (
          <input
            className="auth-input"
            style={{width:'100%',marginBottom:'0.5rem'}}
            placeholder="https://example.com/article..."
            value={inputUrl}
            onChange={e => setInputUrl(e.target.value)}
          />
        )}

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:'1rem'}}>
          <button
            className="scan-btn"
            disabled={scanning || (inputMode === 'text' ? !inputText.trim() : !inputUrl.trim())}
            onClick={runScan}
          >
            {scanning ? (<><div className="spinner" style={{width:18,height:18,borderWidth:2}}></div> Analyzing...</>) : (<>Scan for Manipulation</>)}
          </button>
          {inputMode === 'text' && inputText.length > 0 && (
            <span style={{fontSize:'0.8rem',color:'var(--text-dim)'}}>{inputText.length.toLocaleString()} chars {inputText.length > 4000 && '(will be truncated to 4,000)'}</span>
          )}
        </div>
      </div>

      {/* Error */}
      {error && (
        <div className="card" style={{borderColor:'rgba(239,68,68,0.3)',marginBottom:'1.5rem'}}>
          <p style={{color:'#f87171'}}>Error: {error}</p>
        </div>
      )}

      {/* Results */}
      {result && (
        <div>
          {/* Overall Score Header */}
          <div className="card" style={{marginBottom:'1.5rem'}}>
            <div style={{display:'flex',alignItems:'center',gap:'2rem',flexWrap:'wrap'}}>
              <div className={`overall-score-ring ${scannerColor(result.overall_score)}`}>
                {result.overall_score}
                <span className="overall-score-label" style={{color: result.overall_score >= 70 ? '#f87171' : result.overall_score >= 40 ? '#fbbf24' : '#34d399'}}>
                  {result.overall_score >= 70 ? 'High Risk' : result.overall_score >= 40 ? 'Moderate' : 'Low Risk'}
                </span>
              </div>
              <div style={{flex:1,minWidth:'200px'}}>
                <h2 style={{color:'#fff',fontSize:'1.2rem',fontWeight:700,marginBottom:'0.5rem'}}>
                  {result.overall_score >= 70 ? 'Significant Manipulation Detected' : result.overall_score >= 40 ? 'Some Manipulation Indicators Found' : 'Low Manipulation Risk'}
                </h2>
                <p style={{color:'var(--text-dim)',fontSize:'0.9rem',lineHeight:1.6}}>{result.analysis_summary}</p>
                {result.confidence && (
                  <span style={{display:'inline-block',marginTop:'0.5rem',fontSize:'0.75rem',color:'var(--text-dim)',background:'var(--navy)',padding:'0.2rem 0.6rem',borderRadius:12}}>
                    AI Confidence: {result.confidence}%
                  </span>
                )}
              </div>
            </div>
          </div>

          {/* Indicator Cards */}
          <h3 style={{color:'#fff',fontSize:'1rem',fontWeight:700,marginBottom:'1rem'}}>Indicator Breakdown</h3>
          <div className="indicator-grid">
            {indicators.map(ind => {
              const meta = INDICATOR_LABELS[ind.key];
              const color = ind.color || scannerColor(ind.score);
              return (
                <div className="indicator-card" key={ind.key}>
                  <div className="indicator-header">
                    <span className="indicator-name">{meta.icon} {meta.name}</span>
                    <span className={`indicator-score-badge ${color}`}>{ind.score}</span>
                  </div>
                  <div className="indicator-bar-bg">
                    <div className={`indicator-bar-fill ${color}`} style={{width: `${Math.min(ind.score, 100)}%`}}></div>
                  </div>
                  <p className="indicator-explanation">{ind.explanation || meta.desc}</p>
                </div>
              );
            })}
          </div>

          {/* Feedback */}
          <div className="card" style={{marginTop:'1.5rem'}}>
            <p style={{color:'var(--text-dim)',fontSize:'0.85rem',marginBottom:'0.5rem'}}>Was this analysis accurate?</p>
            <div className="feedback-btns">
              <button className={`feedback-btn ${feedback === 'accurate' ? 'selected' : ''}`} onClick={() => setFeedback('accurate')}>
                Yes, accurate
              </button>
              <button className={`feedback-btn ${feedback === 'too_high' ? 'selected' : ''}`} onClick={() => setFeedback('too_high')}>
                Scores too high
              </button>
              <button className={`feedback-btn ${feedback === 'too_low' ? 'selected' : ''}`} onClick={() => setFeedback('too_low')}>
                Scores too low
              </button>
              <button className={`feedback-btn ${feedback === 'missed' ? 'selected' : ''}`} onClick={() => setFeedback('missed')}>
                Missed something
              </button>
            </div>
            {feedback && <p style={{color:'var(--green)',fontSize:'0.8rem',marginTop:'0.5rem'}}>Thanks for your feedback!</p>}
          </div>

          {/* Disclaimer */}
          <div className="scanner-disclaimer">
            <strong>Disclaimer:</strong> This analysis is generated by AI and is intended as a critical thinking aid, not a definitive judgment.
            No automated tool can perfectly detect manipulation. Scores reflect potential indicators based on textual patterns
            and should be considered alongside your own judgment, additional research, and diverse information sources.
            GlassPalace does not make claims about the intent of any content author. False positives and false negatives are possible.
          </div>
        </div>
      )}

      {/* Scan History */}
      {history.length > 0 && !result && (
        <div className="card">
          <div className="card-header"><span className="card-title">Recent Scans</span></div>
          {history.map((h, i) => (
            <div key={i} style={{display:'flex',alignItems:'center',gap:'0.75rem',padding:'0.6rem 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={() => setResult(h)}>
              <div className={`indicator-score-badge ${scannerColor(h.overall_score)}`}>{h.overall_score}</div>
              <div style={{flex:1}}>
                <p style={{fontSize:'0.85rem',color:'#fff'}}>{h.input_preview}...</p>
                <p style={{fontSize:'0.7rem',color:'var(--text-dim)'}}>{new Date(h.scanned_at).toLocaleTimeString()}</p>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Real-Time Narrative Intelligence Feed */}
      <PsyOpFeed />
    </div>
  );
}

// ======= PSYOP FEED (Topic-Paired Narrative Intelligence) =======
function PsyOpFeed() {
  const [topics, setTopics] = useState([]);
  const [loading, setLoading] = useState(true);
  const [lastGenerated, setLastGenerated] = useState(null);
  const [expandedRow, setExpandedRow] = useState(null);

  const loadFeed = async () => {
    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}?route=psyop-feed`, {
        headers: { 'apikey': ANON_KEY }
      });
      const data = await res.json();
      if (!data.error) {
        setTopics(data.topics || []);
        setLastGenerated(data.last_generated);
      }
    } catch (e) {
      console.error('Feed load error:', e);
    }
    setLoading(false);
  };

  useEffect(() => { loadFeed(); }, []);
